<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดประวัติส่วนตัวนักเรียน - น้องปิม</title>
    <style>
        /* CSS Reset & Google Fonts via safe web fonts fallback & custom style */
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Mitr', 'Chakra Petch', sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            display: block;
            padding: 20px;
        }

        /* A4 Print Optimization */
        @page {
            size: A4;
            margin: 15mm 12mm;
        }

        .profile-card {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(143, 191, 159, 0.2);
            border: 3px solid #cce3de;
            overflow: hidden;
            position: relative;
        }

        /* Decorative Cat Elements */
        .cat-ear-left {
            position: absolute;
            top: -15px;
            left: 40px;
            width: 50px;
            height: 50px;
            background: #a3b19b;
            transform: rotate(-15deg);
            border-radius: 12px 0 0 0;
            z-index: 1;
        }
        .cat-ear-left::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: #f1c0e8;
            border-radius: 8px 0 0 0;
        }

        .cat-ear-right {
            position: absolute;
            top: -15px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: #a3b19b;
            transform: rotate(15deg);
            border-radius: 0 12px 0 0;
            z-index: 1;
        }
        .cat-ear-right::after {
            content: '';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #f1c0e8;
            border-radius: 0 8px 0 0;
        }

        /* Header Section */
        .card-header {
            background: linear-gradient(135deg, #a3b19b 0%, #6b7b65 100%);
            padding: 35px 30px;
            color: white;
            text-align: center;
            position: relative;
            border-bottom: 5px solid #e8f5e9;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden; /* ให้รูปภาพที่ล้นถูกตัด */
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ครอปรูปให้พอดีวงกลมโดยไม่เสียสัดส่วน */
            display: block;
        }

        .card-header h1 {
            font-size: 24pt;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
        }

        .school-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 11pt;
            font-weight: 400;
            backdrop-filter: blur(5px);
        }

        /* Main Content Layout using Table for WeasyPrint compatibility */
        .card-body {
            display: table;
            width: 100%;
            padding: 25px;
        }

        .card-column {
            display: table-cell;
            width: 50%;
            vertical-align: top;
            padding: 0 15px;
        }
