<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดประวัติส่วนตัวนักเรียน - น้องปิม</title>
    <style>
        /* CSS Reset & Google Fonts via safe web fonts fallback & custom style */
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;500&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Mitr', 'Chakra Petch', sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            display: block;
            padding: 20px;
        }

        /* A4 Print Optimization */
        @page {
            size: A4;
            margin: 15mm 12mm;
        }

        .profile-card {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(143, 191, 159, 0.2);
            border: 3px solid #cce3de;
            overflow: hidden;
            position: relative;
        }

        /* Decorative Cat Elements */
        .cat-ear-left {
            position: absolute;
            top: -15px;
            left: 40px;
            width: 50px;
            height: 50px;
            background: #a3b19b;
            transform: rotate(-15deg);
            border-radius: 12px 0 0 0;
            z-index: 1;
        }
        .cat-ear-left::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: #f1c0e8;
            border-radius: 8px 0 0 0;
        }

        .cat-ear-right {
            position: absolute;
            top: -15px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: #a3b19b;
            transform: rotate(15deg);
            border-radius: 0 12px 0 0;
            z-index: 1;
        }
        .cat-ear-right::after {
            content: '';
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #f1c0e8;
            border-radius: 0 8px 0 0;
        }
